---
# Ensure the upstream node_exporter is running so the WSL Prometheus can scrape
# :9100. The exporter is installed manually (official binary at
# /usr/local/bin/node_exporter, v1.11.1, unit `node_exporter`), which is NEWER
# than Ubuntu's apt `prometheus-node-exporter`. So this role ADOPTS the existing
# service instead of installing a package — no port conflict, no downgrade, no
# monitoring gap. See defaults/main.yml and README for the reasoning.
#
# If you later want Ansible to fully own the binary + unit (reproducible from
# code), that's the "full IaC" path: get_url the release, template the systemd
# unit, notify a restart handler. Not done here on purpose.

- name: Ensure node_exporter service is enabled and running
  ansible.builtin.service:
    name: "{{ node_exporter_service }}"
    state: started
    enabled: true

- name: Confirm node_exporter is listening
  ansible.builtin.wait_for:
    port: "{{ node_exporter_port }}"
    host: 127.0.0.1
    timeout: 10
