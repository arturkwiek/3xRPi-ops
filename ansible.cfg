[defaults]
inventory           = inventory/hosts.ini
roles_path          = roles
retry_files_enabled = False
interpreter_python  = auto_silent

# New hosts on a trusted LAN — skip the interactive host-key prompt on first
# connect (it would hang a non-interactive run). Flip to True once you trust
# known_hosts / have deployed keys.
host_key_checking   = False

# No SSH keys deployed yet -> auth by password. Prompt for the SSH password on
# every run so you don't have to pass --ask-pass each time. Requires `sshpass`.
ask_pass            = True

[privilege_escalation]
become              = False
become_method       = sudo
# sudo on the Pi's needs a password (no NOPASSWD). Prompt for it up front so you
# don't have to pass --ask-become-pass. Plays set `become: true` where needed.
become_ask_pass     = True
